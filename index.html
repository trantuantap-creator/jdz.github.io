<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff6f91">
  <title>给宝宝的专属刮刮乐</title>
  <style>
    :root {
      --bg: #fff4f7;
      --card: rgba(255, 255, 255, 0.82);
      --pink: #ff6f91;
      --rose: #ff8fab;
      --red: #ef476f;
      --gold: #ffca3a;
      --ink: #46333a;
      --muted: #846875;
      --shadow: 0 18px 60px rgba(239, 71, 111, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 202, 58, 0.42), transparent 30%),
        radial-gradient(circle at 84% 8%, rgba(255, 111, 145, 0.38), transparent 26%),
        linear-gradient(160deg, #fff7df 0%, #ffe0ec 48%, #fff4f7 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 28px 18px 38px;
      position: relative;
    }

    .page::before,
    .page::after {
      content: "";
      position: fixed;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.45;
      pointer-events: none;
      z-index: -1;
    }

    .page::before {
      left: -80px;
      top: 110px;
      background: #ffd166;
    }

    .page::after {
      right: -90px;
      bottom: 90px;
      background: #ff8fab;
    }

    .hero {
      text-align: center;
      padding: 22px 14px 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 12px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 111, 145, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      color: var(--red);
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 8px 26px rgba(255, 111, 145, 0.14);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 9vw, 54px);
      line-height: 1.05;
      letter-spacing: -1px;
      color: #3a2630;
    }

    .gradient-text {
      display: block;
      color: transparent;
      background: linear-gradient(92deg, #ef476f, #ff8fab 44%, #f4a261 96%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      max-width: 560px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .notice {
      margin: 10px auto 0;
      color: #9c5061;
      font-size: 13px;
    }

    .panel {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      min-height: 76px;
      padding: 12px 8px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(255, 238, 244, 0.92));
      text-align: center;
      box-shadow: 0 10px 28px rgba(154, 75, 95, 0.1);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      color: var(--red);
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .scratch-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .scratch-card {
      position: relative;
      min-height: 182px;
      border: 0;
      border-radius: 24px;
      padding: 0;
      background: transparent;
      color: inherit;
      box-shadow: 0 14px 34px rgba(239, 71, 111, 0.16);
      cursor: pointer;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .scratch-card:focus-visible {
      outline: 3px solid rgba(239, 71, 111, 0.55);
      outline-offset: 3px;
    }

    .prize,
    .cover {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 14px;
      text-align: center;
    }

    .prize {
      background: linear-gradient(145deg, #fff, #fff2e2);
    }

    .prize-icon {
      font-size: 34px;
      line-height: 1;
    }

    .prize-title {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 900;
      color: #3a2630;
    }

    .prize-desc {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .cover {
      z-index: 2;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22) 0 18%, transparent 18% 32%, rgba(255, 255, 255, 0.16) 32% 44%, transparent 44% 100%),
        linear-gradient(145deg, #ff6f91, #ef476f 58%, #d83c66);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .scratch-card.revealed .cover {
      opacity: 0;
      transform: scale(1.12) rotate(2deg);
      pointer-events: none;
    }

    .cover-symbol {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
      font-size: 28px;
    }

    .cover-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .cover-tip {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
    }

    .result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 245, 248, 0.96));
      border: 1px solid rgba(255, 111, 145, 0.18);
      text-align: center;
    }

    .result h2 {
      margin: 0;
      font-size: 20px;
      color: #3a2630;
    }

    .result p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .selected-prize {
      display: none;
      margin-top: 12px;
      padding: 14px;
      border-radius: 20px;
      background: #fff4d1;
      color: #5c3f00;
      font-weight: 800;
      line-height: 1.5;
    }

    .selected-prize.show {
      display: block;
      animation: pop 0.35s ease both;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 13px 16px;
      color: #fff;
      background: linear-gradient(135deg, var(--red), var(--rose));
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(239, 71, 111, 0.22);
      cursor: pointer;
    }

    .btn.secondary {
      color: var(--red);
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(239, 71, 111, 0.2);
    }

    .rules {
      margin-top: 18px;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .rules strong {
      color: var(--red);
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 20;
    }

    .heart {
      position: absolute;
      bottom: -32px;
      animation: floatUp 2.8s ease-in forwards;
      font-size: 22px;
    }

    @keyframes pop {
      0% { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.35) rotate(18deg); opacity: 0; }
    }

    @media (max-width: 520px) {
      .page {
        padding: 20px 12px 32px;
      }

      .hero {
        padding-top: 16px;
      }

      .panel {
        padding: 12px;
        border-radius: 24px;
      }

      .stats {
        gap: 8px;
      }

      .stat {
        min-height: 68px;
        padding: 10px 6px;
      }

      .stat strong {
        font-size: 20px;
      }

      .scratch-grid {
        gap: 10px;
      }

      .scratch-card {
        min-height: 164px;
        border-radius: 20px;
      }

      .prize-title,
      .cover-title {
        font-size: 16px;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="title">
      <p class="eyebrow">💌 宝宝专属 · 今日限定</p>
      <h1 id="title">四张刮刮乐<span class="gradient-text">抽一个爱的奖励</span></h1>
      <p class="subtitle">请宝宝认真挑选、轻轻一点，刮开今天的好运。每张卡片都有可能藏着专属礼物，最后可以从刮出来的礼物里选一个带走。</p>
      <p class="notice">温馨提示：中奖解释权归最爱宝宝的人所有。</p>
    </section>

    <section class="panel" aria-label="刮刮乐抽奖区">
      <div class="stats" aria-hidden="true">
        <div class="stat"><strong>4</strong><span>张刮刮乐</span></div>
        <div class="stat"><strong>5</strong><span>个礼物池</span></div>
        <div class="stat"><strong>1</strong><span>个最终选择</span></div>
      </div>

      <div class="scratch-grid" id="scratchGrid"></div>

      <div class="result" aria-live="polite">
        <h2 id="resultTitle">先刮开一张看看吧</h2>
        <p id="resultText">刮开的礼物会出现在卡片里，全部刮完以后宝宝可以选一个最心动的。</p>
        <div class="selected-prize" id="selectedPrize"></div>
        <div class="actions">
          <button class="btn" id="chooseButton" type="button">从已刮出的礼物里选一个</button>
          <button class="btn secondary" id="resetButton" type="button">重新洗牌再玩一次</button>
        </div>
      </div>
    </section>

    <section class="rules">
      <strong>礼物池：</strong>洗护套装、运动跑鞋、剃须刀、神秘小惊喜、以上全部。<br>
      <strong>玩法：</strong>点开 4 张刮刮乐，抽到“以上全部”就是超级大奖；如果没抽到，也可以从已经刮出来的礼物里选一个。
    </section>
  </main>

  <div class="hearts" id="hearts" aria-hidden="true"></div>

  <script>
    const prizes = [
      {
        icon: "🧴",
        title: "洗护套装",
        desc: "让宝宝的脸变得嫩嫩哒"
      },
      {
        icon: "👟",
        title: "运动跑鞋",
        desc: "让宝宝在锻炼的时候更轻松更舒适"
      },
      {
        icon: "🪒",
        title: "剃须刀",
        desc: "让宝宝的脸清爽利落，扮演高中生"
      },
      {
        icon: "🎁",
        title: "神秘小惊喜",
        desc: "专属限定小彩蛋，是秘密先不说哦"
      },
      {
        icon: "🎉",
        title: "以上全部！",
        desc: "宝宝真的中大奖，一次性全拥有"
      }
    ];

    const grid = document.querySelector("#scratchGrid");
    const resultTitle = document.querySelector("#resultTitle");
    const resultText = document.querySelector("#resultText");
    const selectedPrize = document.querySelector("#selectedPrize");
    const chooseButton = document.querySelector("#chooseButton");
    const resetButton = document.querySelector("#resetButton");
    const hearts = document.querySelector("#hearts");

    let cards = [];
    let revealedCards = [];

    function shuffle(items) {
      const copied = [...items];
      for (let index = copied.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copied[index], copied[randomIndex]] = [copied[randomIndex], copied[index]];
      }
      return copied;
    }

    function createCard(prize, index) {
      const card = document.createElement("button");
      card.className = "scratch-card";
      card.type = "button";
      card.setAttribute("aria-label", `第 ${index + 1} 张刮刮乐，点击揭晓礼物`);
      card.innerHTML = `
        <div class="prize">
          <div class="prize-icon">${prize.icon}</div>
          <div class="prize-title">${prize.title}</div>
          <div class="prize-desc">${prize.desc}</div>
        </div>
        <div class="cover">
          <div class="cover-symbol">💖</div>
          <div class="cover-title">点我刮开</div>
          <div class="cover-tip">第 ${index + 1} 张好运卡</div>
        </div>
      `;

      card.addEventListener("click", () => revealCard(card, prize));
      return card;
    }

    function revealCard(card, prize) {
      if (card.classList.contains("revealed")) {
        return;
      }

      card.classList.add("revealed");
      revealedCards.push(prize);
      selectedPrize.classList.remove("show");

      if (prize.title.includes("以上全部")) {
        resultTitle.textContent = "哇！宝宝抽到超级大奖啦";
        resultText.textContent = "这张卡片直接解锁全部礼物，今天的好运属于宝宝。";
        selectedPrize.textContent = `${prize.icon} ${prize.title}：${prize.desc}`;
        selectedPrize.classList.add("show");
        burstHearts(18);
        return;
      }

      resultTitle.textContent = `刮出了：${prize.icon} ${prize.title}`;
      resultText.textContent = revealedCards.length === 4
        ? "4 张都刮完啦，现在可以让命运帮宝宝选一个，也可以直接找我兑现最心动的那个。"
        : `已经刮开 ${revealedCards.length} 张，还可以继续看看有没有超级大奖。`;
      burstHearts(8);
    }

    function chooseFromRevealed() {
      if (revealedCards.length === 0) {
        resultTitle.textContent = "宝宝还没刮开礼物呢";
        resultText.textContent = "先点开任意一张刮刮乐，再让命运挑一个。";
        return;
      }

      const jackpot = revealedCards.find((item) => item.title.includes("以上全部"));
      const chosen = jackpot || revealedCards[Math.floor(Math.random() * revealedCards.length)];
      resultTitle.textContent = jackpot ? "最终奖励：全部拿下" : "最终奖励已经选好啦";
      resultText.textContent = "请截图给最爱宝宝的人，马上安排兑现。";
      selectedPrize.textContent = `${chosen.icon} ${chosen.title}：${chosen.desc}`;
      selectedPrize.classList.add("show");
      burstHearts(22);
    }

    function burstHearts(count) {
      const symbols = ["💗", "💖", "💕", "💘", "🌟"];
      for (let index = 0; index < count; index += 1) {
        const heart = document.createElement("span");
        heart.className = "heart";
        heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.animationDelay = `${Math.random() * 0.45}s`;
        heart.style.fontSize = `${18 + Math.random() * 18}px`;
        hearts.appendChild(heart);
        window.setTimeout(() => heart.remove(), 3300);
      }
    }

    function resetGame() {
      cards = shuffle(prizes).slice(0, 4);
      revealedCards = [];
      selectedPrize.classList.remove("show");
      selectedPrize.textContent = "";
      resultTitle.textContent = "先刮开一张看看吧";
      resultText.textContent = "刮开的礼物会出现在卡片里，全部刮完以后宝宝可以选一个最心动的。";
      grid.replaceChildren(...cards.map(createCard));
    }

    chooseButton.addEventListener("click", chooseFromRevealed);
    resetButton.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
