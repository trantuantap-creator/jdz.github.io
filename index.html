<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>жЈЅт║бТАѕжљбує║Т«ЉSurprise</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(160deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 70%, #ec407a 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .container { width: 100%; max-width: 420px; padding: 16px; }

  .header { text-align: center; margin-bottom: 8px; }
  .header .icon { font-size: 40px; }
  .header .title {
    font-size: 24px; font-weight: 900; color: #fff;
    text-shadow: 0 2px 8px rgba(180,40,80,0.4);
    letter-spacing: 3px; margin: 4px 0;
  }
  .header .subtitle {
    font-size: 13px; color: rgba(255,255,255,0.85); letter-spacing: 2px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }

  .card-item {
    position: relative; aspect-ratio: 1 / 1; border-radius: 16px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(180,40,80,0.25); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
  }
  .card-item.enabled:active { transform: scale(0.96); }
  .card-item.disabled { opacity: 0.4; pointer-events: none; }

  .card-inner {
    position: absolute; inset: 0;
    background: linear-gradient(145deg, #fff 0%, #fff0f5 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px;
  }
  .card-inner .prize-emoji { font-size: 36px; }
  .card-inner .prize-label { font-size: 11px; color: #e91e63; letter-spacing: 2px; font-weight: 600; }
  .card-inner .prize-name { font-size: 15px; font-weight: 900; color: #c62828; text-align: center; line-height: 1.3; }
  .card-inner .card-number {
    position: absolute; top: 10px; right: 14px;
    font-size: 13px; font-weight: 900; color: rgba(233,30,99,0.25);
  }

  canvas.scratch-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none;
  }

  .lock-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; pointer-events: none; z-index: 2;
  }

  .bottom-hint {
    text-align: center; color: rgba(255,255,255,0.9); font-size: 13px;
    letter-spacing: 2px; animation: pulse 1.5s ease-in-out infinite;
    margin: 4px 0 12px; min-height: 20px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
  }

  .btn-area { text-align: center; margin-top: 8px; }
  .btn-area .btn {
    display: inline-block; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px);
    color: #fff; border: 2px solid rgba(255,255,255,0.5);
    padding: 10px 32px; border-radius: 24px; font-size: 14px;
    font-weight: 600; letter-spacing: 3px; cursor: pointer; transition: all 0.2s;
  }
  .btn-area .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }

  .modal-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; z-index: 999;
    animation: fadeIn 0.3s ease;
  }
  .modal-mask.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-box {
    background: #fff; border-radius: 20px; padding: 28px 20px 22px;
    text-align: center; width: 88%; max-width: 340px;
    animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-box .modal-emoji { font-size: 52px; margin-bottom: 8px; }
  .modal-box .modal-text { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 4px; }
  .modal-box .modal-prize { font-size: 22px; font-weight: 900; color: #e91e63; margin-bottom: 4px; }
  .modal-box .modal-desc { font-size: 13px; color: #888; margin-bottom: 14px; line-height: 1.5; }
  .modal-box .btn {
    display: inline-block; background: linear-gradient(135deg, #f06292, #e91e63);
    color: #fff; border: none; padding: 10px 36px; border-radius: 24px;
    font-size: 15px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
  }
  .modal-box .btn:active { transform: scale(0.95); }

  .reveal-row {
    display: flex; gap: 4px; justify-content: center; margin-top: 12px;
    padding-top: 12px; border-top: 1px dashed #eee; flex-wrap: wrap;
  }
  .reveal-row .mini-card {
    background: #fff5f7; border-radius: 8px; padding: 6px 10px;
    text-align: center; flex: 1;
  }
  .reveal-row .mini-card .mini-emoji { font-size: 20px; }
  .reveal-row .mini-card .mini-name {
    font-size: 10px; color: #e91e63; font-weight: 700; margin-top: 2px; line-height: 1.3;
  }
  .reveal-row .mini-card .mini-desc {
    font-size: 9px; color: #999; margin-top: 2px; line-height: 1.3;
  }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
  .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="container">
  <div class="header">
    <div class="icon">ждЃТІ░</div>
    <div class="title">жЈЅт║бТАѕжљбує║Т«ЉSurprise</div>
    <div class="subtitle">жќФтцЅуФ┤т»«уі▓тЪЅжЇњЬє╝т┤▒ Уи» жЇњЬє╝у┤ЉжЈѕтцІтёЋжЇа?/div>
  </div>

  <div class="grid" id="cardGrid"></div>

  <div class="bottom-hint" id="bottomHint">ждЃТєю жљљуЉ░тџ«ТХЊРѓгт»«уі▓т┤▒жљЌтЏиу┤ЮжљњУи║ТѓЌжЇњЬє╝у┤Љуђ╣?/div>

  <div class="btn-area">
    <button class="btn" onclick="resetGame()">ждЃТћД жЇљтХєТйхТХЊРѓгтеє?/button>
  </div>
</div>

<div class="modal-mask hidden" id="resultModal">
  <div class="modal-box">
    <div class="modal-emoji" id="modalEmoji"></div>
    <div class="modal-text" id="modalText"></div>
    <div class="modal-prize" id="modalPrize"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="reveal-row" id="revealRow"></div>
    <button class="btn" onclick="closeModal()">жЅѓсѓЈугЇ жЈђТюхугЁжј»тЕѓТъЕ</button>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
// ============================================================
// ждЃтих Т┐ѓТаДТљД
// ============================================================
const PRIZES = [
  { name: "те▓ТЦЂтДбТ┐ѓТЦёЬЌі",   emoji: "ждЃлб", desc: "уњЂРЋЂуќѓуђ╣Т┐ѕТ«ЉжЉ┤уе┐тйЅт»░ТЦђЬЂдуђџРЋЂТљЙ" },
  { name: "ТЮЕТёгтДЕуњ║Тѕдуђи",   emoji: "ждЃТє╗", desc: "уњЂРЋЂуќѓуђ╣Т┐єТ╣фжќ┐УЇцтЂДжљетІгТцѓжЇіТгљТ┤┐ТЮъу╗ўТЙЌжЈЄуБІтъЮжќФ? },
  { name: "жЇЊтє«сђЈжЇњРѓг",     emoji: "ждЃуЇЪ", desc: "уњЂРЋЂуќѓуђ╣Т┐ѕТ«ЉжЉ┤тЉіуФ╗жљќУЌЅтЪёжњђТќцу┤ЮжјхЬєйу┤еТЦѓТе╣УЁЉжљб? },
  { name: "у╗ЂуѓхЬЮЮуЂЈт┐ћтёЋжЇа?, emoji: "ждЃтих", desc: "ТХЊТњ│уЮўжЌёТёгуЋЙуЂЈт┐ЊтЃхжЊћтгХу┤ЮжЈёЬѕюЬЮЮуђхтЌЌтјЏТХЊтХѕЬЄЕжЇЮ? },
  { name: "ТхасЃцугѓжЇЈсёЕтё┤жћЏ?, emoji: "ждЃтИђ", desc: "уђ╣Т┐єуќѓжљфує║Т«ЉТХЊЬЁъсЂЄТ┐ѓТаху┤ЮТхасЃцугѓу╗ђУѓЕтб┐ТХЊРѓгтеєРёЃРѓгЛЃтЈЈжјисЃдТ╣Ђ" },
];

// ============================================================
// жЌЁт┐ћТ║ђжјХ?ТХЊЬЂју┤Ўте▓ТЦЃтбЮжЇџт║АтйЄжЇЊ?жћЏ?// ============================================================
function pickPrizes() {
  const arr = [...PRIZES];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, 4);
}

// ============================================================
// жЇЈсёЦуюгжљўУѕхРѓг?// ============================================================
let cards = [];
let selectedIndex = -1;
let isRevealed = false;
let isDrawing = false;
const cardGrid = document.getElementById('cardGrid');
const bottomHint = document.getElementById('bottomHint');
const resultModal = document.getElementById('resultModal');
const modalEmoji = document.getElementById('modalEmoji');
const modalText = document.getElementById('modalText');
const modalPrize = document.getElementById('modalPrize');
const modalDesc = document.getElementById('modalDesc');
const revealRow = document.getElementById('revealRow');
const confettiContainer = document.getElementById('confetti');

// ============================================================
// жЈІтІФу╝Њ4т»«уі▓т┤▒жљЌ?// ============================================================
function buildCards() {
  const prizes = pickPrizes();
  cardGrid.innerHTML = '';
  cards = [];
  selectedIndex = -1;
  isRevealed = false;
  bottomHint.textContent = 'ждЃТєю жљљуЉ░тџ«ТХЊРѓгт»«уі▓т┤▒жљЌтЏиу┤ЮжљњУи║ТѓЌжЇњЬє╝у┤Љуђ╣?;
  bottomHint.style.animation = 'pulse 1.5s ease-in-out infinite';

  for (let i = 0; i < 4; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-item enabled';
    wrapper.setAttribute('data-index', i);

    const inner = document.createElement('div');
    inner.className = 'card-inner';
    inner.innerHTML = '<div class="prize-emoji">жЅѓ?/div><div class="prize-label">???</div><div class="prize-name">жЇњЬє╝у┤Љжј╗ЬЁЪТфй</div><div class="card-number">0' + (i + 1) + '</div>';

    const canvas = document.createElement('canvas');
    canvas.className = 'scratch-canvas';

    wrapper.appendChild(inner);
    wrapper.appendChild(canvas);
    cardGrid.appendChild(wrapper);

    const cardObj = { prize: prizes[i], revealed: false, canvas, wrapper, inner, scratchCount: 0 };
    cards.push(cardObj);
    bindScratch(canvas, i);
  }

  requestAnimationFrame(() => {
    cards.forEach((c, i) => { initCardCanvas(i); });
  });
}

function initCardCanvas(index) {
  const c = cards[index];
  const wrapper = c.wrapper;
  const canvas = c.canvas;
  const rect = wrapper.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  c.ctx = ctx;
  drawCardOverlay(index);
}

function drawCardOverlay(index) {
  const c = cards[index];
  const wrapper = c.wrapper;
  const w = wrapper.clientWidth;
  const h = wrapper.clientHeight;
  const ctx = c.ctx;
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#e0a0b0');
  grad.addColorStop(0.5, '#d4879b');
  grad.addColorStop(1, '#c07085');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = (w * 0.15) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 20; i++) {
    ctx.fillText('жѕЙ?, Math.random() * w, Math.random() * h);
    ctx.fillText('жЅѓ?, Math.random() * w, Math.random() * h);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold ' + (w * 0.16) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('жЇњЬє╝у┤Љ', w / 2, h / 2 - 6);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = (w * 0.09) + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('жЅѓсѓЈугЇ', w / 2, h / 2 + 20);
}

function selectCard(index) {
  selectedIndex = index;
  bottomHint.textContent = 'ждЃТєю жљбсёдтбюжјИтЏДтЪЅт»«РѓгтеЉтѓџую░жћЏ?;
  bottomHint.style.animation = 'pulse 1.5s ease-in-out infinite';
  cards.forEach((c, i) => {
    if (i !== index) {
      c.wrapper.classList.remove('enabled');
      c.wrapper.classList.add('disabled');
      var lock = document.createElement('div');
      lock.className = 'lock-overlay';
      lock.textContent = 'ждЃТЋђ';
      c.wrapper.appendChild(lock);
    }
  });
}

function bindScratch(canvas, index) {
  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (isRevealed) return;
    if (selectedIndex === -1) { selectCard(index); return; }
    if (selectedIndex !== index) return;
    isDrawing = true;
    var pos = getPos(e);
    scratchAt(index, pos.x, pos.y);
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (!isDrawing || selectedIndex !== index || isRevealed) return;
    var pos = getPos(e);
    scratchAt(index, pos.x, pos.y);
  }, { passive: false });

  canvas.addEventListener('touchend', function() { isDrawing = false; });

  canvas.addEventListener('mousedown', function(e) {
    if (isRevealed) return;
    if (selectedIndex === -1) { selectCard(index); return; }
    if (selectedIndex !== index) return;
    isDrawing = true;
    var pos = getPos(e);
    scratchAt(index, pos.x, pos.y);
  });

  canvas.addEventListener('mousemove', function(e) {
    if (!isDrawing || selectedIndex !== index || isRevealed) return;
    var pos = getPos(e);
    scratchAt(index, pos.x, pos.y);
  });

  canvas.addEventListener('mouseup', function() { isDrawing = false; });
  canvas.addEventListener('mouseleave', function() { isDrawing = false; });
}

function scratchAt(index, x, y) {
  var c = cards[index];
  var ctx = c.ctx;
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(x, y, 24, 0, Math.PI * 2);
  ctx.fill();
  c.scratchCount++;
  if (c.scratchCount % 6 === 0) checkReveal(index);
}

function checkReveal(index) {
  var c = cards[index];
  var canvas = c.canvas;
  var imageData = c.ctx.getImageData(0, 0, canvas.width, canvas.height);
  var pixels = imageData.data;
  var transparent = 0;
  var total = pixels.length / 4;
  var step = Math.max(1, Math.floor(total / 3000));
  for (var i = 3; i < pixels.length; i += 4 * step) {
    if (pixels[i] === 0) transparent++;
  }
  if (transparent / (total / step) > 0.4) revealCard(index);
}

function revealCard(index) {
  isRevealed = true;
  var c = cards[index];
  c.revealed = true;
  bottomHint.textContent = '';
  bottomHint.style.animation = 'none';
  var ctx = c.ctx;
  var wrapper = c.wrapper;
  var w = wrapper.clientWidth;
  var alpha = 0;
  function tick() {
    alpha += 0.06;
    if (alpha >= 1) {
      ctx.clearRect(0, 0, w, w);
      updateCardInner(index);
      showResultModal(index);
      return;
    }
    ctx.clearRect(0, 0, w, w);
    ctx.globalAlpha = 1 - alpha;
    drawCardOverlay(index);
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();
}

function updateCardInner(index) {
  var c = cards[index];
  c.inner.querySelector('.prize-emoji').textContent = c.prize.emoji;
  c.inner.querySelector('.prize-label').textContent = 'ждЃтИё ТхБуі▒УЁЉТхю?;
  c.inner.querySelector('.prize-name').textContent = c.prize.name;
}

function showResultModal(index) {
  var c = cards[index];
  modalEmoji.textContent = c.prize.emoji;
  modalText.textContent = c.prize.name === 'ТхасЃцугѓжЇЈсёЕтё┤жћЏ? ? 'жЇЮтЏиу┤њжћЏ? : 'жјГЬЁъТъЕТхБуІЁу┤њ';
  modalPrize.textContent = c.prize.name;
  modalDesc.textContent = c.prize.desc;

  revealRow.innerHTML = '';
  cards.forEach(function(cc, i) {
    if (i !== index) {
      var div = document.createElement('div');
      div.className = 'mini-card';
      div.innerHTML = '<div class="mini-emoji">' + cc.prize.emoji + '</div><div class="mini-name">' + cc.prize.name + '</div>';
      revealRow.appendChild(div);
    }
  });

  cards.forEach(function(cc, i) {
    if (i !== index) {
      cc.ctx.clearRect(0, 0, cc.wrapper.clientWidth, cc.wrapper.clientHeight);
      var lock = cc.wrapper.querySelector('.lock-overlay');
      if (lock) lock.remove();
      cc.inner.querySelector('.prize-emoji').textContent = cc.prize.emoji;
      cc.inner.querySelector('.prize-label').textContent = 'жЈѕЬЂѕРѓгтцІтФе';
      cc.inner.querySelector('.prize-name').textContent = cc.prize.name;
      cc.wrapper.classList.remove('disabled');
    }
  });

  resultModal.classList.remove('hidden');
  spawnConfetti();
}

function closeModal() { resultModal.classList.add('hidden'); }

function resetGame() { confettiContainer.innerHTML = ''; buildCards(); }

// ============================================================
// у╗ђУЅ░тД│
// ============================================================
function spawnConfetti() {
  var colors = ['#e91e63','#f06292','#f48fb1','#ff80ab','#ff4081','#ffc107','#ffab91'];
  var frag = document.createDocumentFragment();
  for (var i = 0; i < 80; i++) {
    var p = document.createElement('div');
    var s = Math.random() * 8 + 4;
    p.style.cssText = 'position:absolute;left:' + (Math.random()*100) + '%;top:-10px;width:' + s + 'px;height:' + (s*(Math.random()*0.5+0.5)) + 'px;background:' + colors[Math.floor(Math.random()*colors.length)] + ';border-radius:' + (Math.random()>0.6?'50%':'2px') + ';transform:rotate(' + (Math.random()*360) + 'deg);animation:confettiFall ' + (Math.random()*2+2) + 's linear forwards;animation-delay:' + (Math.random()*0.6) + 's';
    frag.appendChild(p);
  }
  var s = document.createElement('style');
  s.textContent = '@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(0.2);opacity:0}}';
  confettiContainer.appendChild(s);
  confettiContainer.appendChild(frag);
  setTimeout(function(){ confettiContainer.innerHTML = ''; }, 4000);
}

// ============================================================
// жЉ│т▒ЙТФЎжљќтЇъуИЙ
// ============================================================
function spawnHearts() {
  var bg = document.getElementById('heartsBg');
  var hearts = ['жЅѓ?,'ждЃТїё','ждЃТїЁ','ждЃТїє','ждЃТїљ'];
  for (var i = 0; i < 12; i++) {
    var h = document.createElement('div');
    h.textContent = hearts[Math.floor(Math.random()*5)];
    h.style.cssText = 'position:fixed;left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;font-size:' + (Math.random()*16+10) + 'px;opacity:' + (Math.random()*0.15+0.05) + ';animation:floatHeart ' + (Math.random()*8+8) + 's linear infinite;animation-delay:' + (Math.random()*5) + 's;pointer-events:none';
    bg.appendChild(h);
  }
  var s = document.createElement('style');
  s.textContent = '@keyframes floatHeart{0%{transform:translateY(0) rotate(0deg);opacity:0.12}50%{transform:translateY(-60vh) rotate(20deg);opacity:0.05}100%{transform:translateY(-110vh) rotate(0deg);opacity:0.1}}';
  bg.appendChild(s);
}

window.addEventListener('resize', function() {
  if (!isRevealed && selectedIndex >= 0) initCardCanvas(selectedIndex);
});

spawnHearts();
buildCards();
</script>

</body>
</html>
